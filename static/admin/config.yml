# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: schubert-da/the-living-grid
  skip_ci: true

media_folder: /static/media
public_folder: /media

media_libraries:
  default:
    config:
      transformations:
        raster_image: # original format
          format: webp # new format, only `webp` is supported
          quality: 85 # default: 85
          width: 435 # default: original size
          height: 500 # default: original size
        svg:
          optimize: true

collections:
  - name: images
    label: Gallery Images
    folder: src/content/image-gallery
    format: json
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Image, name: image, widget: image, multiple: true, max: 5 }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Upload date, name: date, widget: datetime, picker_utc: true, default: '{{now}}' }
      - { label: Tags, name: tags, widget: list }

  - name: works
    label: Works
    folder: src/content/works
    format: json
    identifier_field: title
    slug: '{{slug}}'
    create: true
    summary: '{{title}} — {{client}}'
    sortable_fields: [order, title, client]
    fields:
      - {
          label: Order,
          name: order,
          widget: number,
          value_type: int,
          min: 0,
          hint: 'Controls display order on the works grid (lower first)'
        }
      - { label: Title, name: title, widget: string }
      - { label: Client, name: client, widget: string }
      - {
          label: Project Type,
          name: projectType,
          widget: string,
          hint: 'e.g. Interactive Story, Dashboard, Scrollytelling narrative'
        }
      - label: Blocks
        name: blocks
        widget: list
        summary: '{{fields.type}} · cols {{fields.cols}}'
        types:
          - label: Image
            name: image
            widget: object
            fields:
              - label: Image
                name: src
                widget: image
                media_libraries:
                  default:
                    config:
                      transformations:
                        raster_image:
                          format: webp
                          quality: 80
                          width: 800
              - { label: Alt text, name: alt, widget: string }
              - {
                  label: Columns,
                  name: cols,
                  widget: number,
                  value_type: int,
                  min: 1,
                  max: 2,
                  default: 1
                }
          - label: Text
            name: text
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - {
                  label: Description,
                  name: description,
                  widget: text,
                  hint: 'Inline HTML allowed (e.g. <strong>)'
                }
              - { label: Link, name: link, widget: string }
              - {
                  label: Columns,
                  name: cols,
                  widget: number,
                  value_type: int,
                  min: 1,
                  max: 3,
                  default: 2
                }
